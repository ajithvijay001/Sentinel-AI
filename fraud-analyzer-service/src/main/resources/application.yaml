spring:
  application:
    name: fraud-analyzer-service
  kafka:
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    consumer:
      bootstrap-servers: localhost:9092
      group-id: fraud-analyzer-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      properties:
       spring.deserializer.value.delegate.class: org.springframework.kafka.support.serializer.JsonDeserializer
       spring.json.trusted.packages: "com.sentinelai.*"
       spring.kafka.serialization.trust.packages: "*"
       spring.json.type.mapping: "com.sentinelai.transactionservice.model.TransactionRequest:com.sentinelai.fraudanalyzerservice.model.dto.TransactionRequest"
  ai:
    google:
      genai:
        api-key: ${API-KEY}
        project-id: ${PROJECT-ID}
        chat: 
          options:
           safety-settings:
           - category: HARM_CATEGORY_DANGEROUS_CONTENT
             threshold: BLOCK_NONE
           - category: HARM_CATEGORY_HARASSMENT
             threshold: BLOCK_NONE
           - category: HARM_CATEGORY_HATE_SPEECH
             threshold: BLOCK_NONE
           - category: HARM_CATEGORY_SEXUALLY_EXPLICIT
             threshold: BLOCK_NONE
           model: gemini-2.5-flash
           thinkingBudget: 0
server:
  port: 8081
logging:
  level:
    org.springframework.ai.chat.client.advisor: DEBUG